# This workflow will build the Darwins-Gate Go project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Darwins-Gate/go.mod'
      - 'Darwins-Gate/go.sum'
      - 'Darwins-Gate/**/*.go'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Darwins-Gate/go.mod'
      - 'Darwins-Gate/go.sum'
      - 'Darwins-Gate/**/*.go'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Darwins-Gate
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: Darwins-Gate/go.mod

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
