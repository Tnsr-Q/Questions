<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TensorQ Darwinian Grid — Live Streaming Sim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.75);
            padding: 10px 14px;
            border: 1px solid #0f0;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre;
            pointer-events: none;
            max-width: 380px;
            z-index: 100;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            text-align: center;
            z-index: 50;
        }
        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #0a0;
            border-top-color: #0f0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.1/full/pyodide.js"></script>
    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
    <!-- TensorQ Client (ES module — loads webl-render.js internally) -->
    <script type="module" src="js/tensorq-client.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="status">Connecting to Darwinian Grid… (Alpha cell streaming)</div>
    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">Initializing Darwinian Grid…</div>
    </div>
    <script>
        // Hide loading overlay once the module takes over
        window.addEventListener("load", () => {
            const loading = document.getElementById("loading");
            if (loading) {
                setTimeout(() => { loading.style.opacity = "0"; loading.style.transition = "opacity 0.5s"; }, 500);
                setTimeout(() => { loading.remove(); }, 1000);
            }
        });
    </script>
</body>
</html>
